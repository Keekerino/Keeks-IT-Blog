<details style="border: 1px solid #ccc; border-radius: 8px; margin: 1rem 0; padding: 0.5rem 1rem; background-color: #fdfdfd;">
    <summary style="cursor: pointer; font-weight: bold; font-size: 1.1rem; padding: 0.5rem 0;">
        {{ .Get 0 | default "Details anzeigen" }}
    </summary>
    <div style="padding: 1rem 0; border-top: 1px solid #eee;">
        {{ .Inner | markdownify }}
    </div>
</details>
