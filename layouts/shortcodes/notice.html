{{- $type := .Get 0 -}}
<div class="notice-box {{ $type | default "info" }}" style="
    padding: 15px; 
    margin: 20px 0; 
    border-left: 5px solid; 
    background-color: #f9f9f9;
    border-radius: 4px;
">
    {{ if $type }}
        <strong style="text-transform: uppercase; display: block; margin-bottom: 5px;">
            {{ $type }}:
        </strong>
    {{ end }}

    <div class="notice-content">
        {{ .Inner | markdownify }}
    </div>
</div>
