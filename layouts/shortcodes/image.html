<div class="{{ .Get "class" | default "mw-100" }}" 
     style="text-align: center; margin: 0 auto 2rem auto; max-width: {{ .Get "width" | default "600px" }};">
  
  <img src="{{ .Get "src" | safeURL }}" 
       alt="{{ .Get "alt" | default "Bild" }}" 
       style="width: 100%; border-radius: 12px; height: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
  
  {{ with .Get "caption" }}
  <p style="text-align: center; margin-top: 0.5rem;">
    <em>{{ . | markdownify }}</em>
  </p>
{{ end }}
</div>
