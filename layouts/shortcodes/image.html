{{- $width := .Get "width" | default "300px" -}}
{{- $float := .Get "float" | default "none" -}}

<span style='display: inline-block; 
            float: {{ $float }}; 
            width: {{ $width }} !important; 
            max-width: 100%; 
            margin: {{ if eq $float "left" }}0.5rem 1.5rem 0.5rem 0{{ else if eq $float "right" }}0.5rem 0 0.5rem 1.5rem{{ end }};'>
    
    <img src="{{ .Get "src" | safeURL }}" 
         alt="{{ .Get "alt" | default "Bild" }}" 
         style="width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

    {{ with .Get "caption" }}
        <span style="display: block; text-align: center; font-size: 0.8rem; margin-top: 0.4rem; font-style: italic; color: #666;">
            {{ . | markdownify }}
        </span>
    {{ end }}
</span>
