{{- $src := .Get "src" | safeURL -}}
{{- $width := .Get "width" | default "100%" -}}
{{- $float := .Get "float" | default "none" -}}
{{- $hover := .Get "hover" | default (.Get "alt" | default "Bild") -}}

<figure style='
    display: {{ if eq $float "none" }}block{{ else }}inline-block{{ end }}; 
    float: {{ $float }}; 
    width: {{ $width }} !important; 
    max-width: 100%; 
    margin: {{ if eq $float "left" }}0.5rem 1.5rem 1rem 0{{ else if eq $float "right" }}0.5rem 0 1rem 1.5rem{{ else }}2rem auto{{ end }};
    padding: 0;
    vertical-align: top;
'>
    <a href="{{ $src }}" target="_blank" title="In voller Größe öffnen">
        <img src="{{ $src }}" 
             alt="{{ .Get "alt" | default "Bild" }}" 
             title="{{ $hover }}"
             style="width: 100%; height: auto; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: block; cursor: zoom-in;">
    </a>
    
    {{ with .Get "caption" }}
        <figcaption style="text-align: center; font-size: 0.85rem; color: #666; margin-top: 0.6rem; font-style: italic; line-height: 1.3; display: block;">
            {{ . | markdownify }}
        </figcaption>
    {{ end }}
</figure>

{{ if ne $float "none" }}<div style="clear: none;"></div>{{ end }}
