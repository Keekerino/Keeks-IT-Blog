<button id="back-to-top" title="Nach oben scrollen">↑ Top</button>

<script>
    const btt = document.getElementById("back-to-top");

    // Konfigurierbare Parameter
    const scrollThreshold = 500; // ab wieviel px scrollen der Knopf erscheint
    const fadeDuration = 0.4;    // Sekunden für Ein-/Ausblenden

    // Initial CSS für sanftes Ein-/Ausblenden
    btt.style.transition = `opacity ${fadeDuration}s ease`;
    btt.style.opacity = 0;
    btt.style.pointerEvents = "none"; // verhindert Klicks, wenn unsichtbar
    btt.style.display = "block"; // bleibt im Layout, unsichtbar durch opacity

    // Klick-Funktion bleibt erhalten
    btt.addEventListener("click", function() {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });

    // Scroll-Event
    window.addEventListener("scroll", function() {
        if (window.scrollY > scrollThreshold) {
            btt.style.opacity = 1;
            btt.style.pointerEvents = "auto";
        } else {
            btt.style.opacity = 0;
            btt.style.pointerEvents = "none";
        }
    });
</script>
