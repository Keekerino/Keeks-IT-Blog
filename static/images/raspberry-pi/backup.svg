<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <rect width="1000" height="600" fill="#1A1B26"/>
  
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="2" fill="#24283B"/>
  </pattern>
  <rect width="1000" height="600" fill="url(#dots)"/>

  <g transform="translate(150, 150) scale(0.9)">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="#24283B" stroke="#9ECE6A" stroke-width="4"/>
    
    <rect x="20" y="10" width="200" height="15" rx="3" fill="#1A1B26"/>
    <path d="M30,17.5 h180" stroke="#7AA2F7" stroke-width="5" stroke-dasharray="2, 7"/>

    <rect x="90" y="50" width="60" height="60" rx="6" fill="#1A1B26" stroke="#F7768E" stroke-width="3"/>
    
    <rect x="240" y="20" width="30" height="45" rx="3" fill="#7AA2F7"/>
    <rect x="240" y="80" width="30" height="45" rx="3" fill="#7AA2F7"/>
  </g>

  <g transform="translate(180, 400)">
    <rect x="0" y="0" width="140" height="60" rx="10" fill="#BB9AF7"/>
    <rect x="140" y="10" width="30" height="40" fill="#C0CAF5"/>
    <circle cx="120" cy="30" r="4" fill="#1A1B26"/>
  </g>

  <g transform="translate(650, 400)">
    <path d="M0,0 L100,0 L120,20 L120,180 L0,180 L0,20 Z" fill="#E0AF68"/>
    <line x1="20" y1="15" x2="100" y2="15" stroke="#1A1B26" stroke-width="2"/>
    <line x1="20" y1="25" x2="100" y2="25" stroke="#1A1B26" stroke-width="2"/>
  </g>

  <g transform="translate(710, 460) scale(1.2)">
    <path d="M0,0 L45,-15 L90,0 L90,40 C90,80 70,100 45,120 C20,100 0,80 0,40 Z" fill="#9ECE6A" stroke="#1A1B26" stroke-width="6" stroke-linejoin="round"/>
    <path d="M25,50 L40,65 L65,30" fill="none" stroke="#1A1B26" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(500, 100) scale(1.2)">
    <circle cx="0" cy="0" r="50" fill="#24283B" stroke="#7AA2F7" stroke-width="4"/>
    <line x1="0" y1="0" x2="0" y2="-35" stroke="#7AA2F7" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="15" y2="15" stroke="#7AA2F7" stroke-width="4" stroke-linecap="round"/>
    
    <path d="M60,-20 A 30,30 0 0,1 60,20" fill="none" stroke="#BB9AF7" stroke-width="6" stroke-linecap="round"/>
    <polygon points="60,25 50,15 70,15" fill="#BB9AF7"/>
    <path d="M-60,20 A 30,30 0 0,1 -60,-20" fill="none" stroke="#BB9AF7" stroke-width="6" stroke-linecap="round"/>
    <polygon points="-60,-25 -50,-15 -70,-15" fill="#BB9AF7"/>
  </g>

  <g transform="translate(350, 430)">
    <path d="M0,0 L270,0" fill="none" stroke="#7AA2F7" stroke-width="12" stroke-linecap="round" stroke-dasharray="20, 15"/>
    <polygon points="280,0 260,-10 260,10" fill="#7AA2F7"/>
  </g>

</svg>
